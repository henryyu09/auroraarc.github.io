<svg width="680" height="660" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Order book queue timing diagram</title>
<desc>Timeline showing how a price-level queue evolves across six events: three adds (orders A, B, C), a cancel of A, a modify of B that loses queue priority, and a fill that removes C.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="660" fill="#ffffff"/>

<!-- legend / direction header -->
<text x="425" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Front of queue (fills next) &#8594; back of queue</text>
<line x1="230" y1="44" x2="620" y2="44" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- timeline axis -->
<line x1="15" y1="60" x2="15" y2="630" stroke="#B4B2A9" stroke-width="1"/>
<circle cx="15" cy="98" r="4" fill="#888780"/>
<circle cx="15" cy="193" r="4" fill="#888780"/>
<circle cx="15" cy="288" r="4" fill="#888780"/>
<circle cx="15" cy="383" r="4" fill="#888780"/>
<circle cx="15" cy="478" r="4" fill="#888780"/>
<circle cx="15" cy="573" r="4" fill="#888780"/>

<!-- row separators -->
<line x1="30" y1="155" x2="660" y2="155" stroke="#E5E3DA" stroke-width="1"/>
<line x1="30" y1="250" x2="660" y2="250" stroke="#E5E3DA" stroke-width="1"/>
<line x1="30" y1="345" x2="660" y2="345" stroke="#E5E3DA" stroke-width="1"/>
<line x1="30" y1="440" x2="660" y2="440" stroke="#E5E3DA" stroke-width="1"/>
<line x1="30" y1="535" x2="660" y2="535" stroke="#E5E3DA" stroke-width="1"/>

<!-- ROW 0: T=0 ADD A -->
<text x="30" y="98" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">T=0 &#8212; ADD A</text>
<rect x="210" y="78" width="90" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="207" y="75" width="96" height="46" rx="8" fill="none" stroke="#BA7517" stroke-width="1.5"/>
<text x="255" y="98" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#04342C">A &#183; 100</text>

<!-- ROW 1: T=1 ADD B -->
<text x="30" y="193" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">T=1 &#8212; ADD B</text>
<rect x="210" y="173" width="90" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="255" y="193" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#04342C">A &#183; 100</text>
<rect x="312" y="173" width="90" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<rect x="309" y="170" width="96" height="46" rx="8" fill="none" stroke="#BA7517" stroke-width="1.5"/>
<text x="357" y="193" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#4A1B0C">B &#183; 50</text>

<!-- ROW 2: T=2 ADD C -->
<text x="30" y="288" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">T=2 &#8212; ADD C</text>
<rect x="210" y="268" width="90" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="255" y="288" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#04342C">A &#183; 100</text>
<rect x="312" y="268" width="90" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="357" y="288" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#4A1B0C">B &#183; 50</text>
<rect x="414" y="268" width="90" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<rect x="411" y="265" width="96" height="46" rx="8" fill="none" stroke="#BA7517" stroke-width="1.5"/>
<text x="459" y="288" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#26215C">C &#183; 70</text>

<!-- ROW 3: T=3 CANCEL A -->
<text x="30" y="383" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">T=3 &#8212; CANCEL A</text>
<rect x="210" y="363" width="90" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="255" y="383" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#4A1B0C">B &#183; 50</text>
<rect x="312" y="363" width="90" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="357" y="383" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#26215C">C &#183; 70</text>
  
<!-- ROW 4: T=4 MODIFY B (size increase, lost priority) -->
<text x="30" y="463" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">T=4 &#8212; MODIFY B</text>
<rect x="210" y="458" width="90" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="255" y="478" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#26215C">C &#183; 70</text>
<rect x="312" y="458" width="90" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<rect x="309" y="455" width="96" height="46" rx="8" fill="none" stroke="#BA7517" stroke-width="1.5"/>
<text x="357" y="478" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#4A1B0C">B &#183; 100</text>
<text x="210" y="513" font-family="sans-serif" font-size="12" fill="#993C1D">B loses priority: 50 &#8594; 100, moved to back</text>

<!-- ROW 5: T=5 FILL -->
<text x="30" y="558" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">T=5 &#8212; FILL</text>
<rect x="210" y="553" width="90" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="255" y="573" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#4A1B0C">B &#183; 100</text>
</svg>
