<svg width="680" height="300" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Fill rate check timeline</title>
<desc>Timeline showing an order placed at T=0, with three subsequent checks at 100 milliseconds, 1 second, and 5 seconds after placement, each reporting an aggregate fill rate: 24.5%, 72.8%, and 94.0% respectively.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="300" fill="#ffffff"/>

<!-- connectors -->
<line x1="340" y1="84" x2="340" y2="104" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<path d="M340 104 L130 104" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<path d="M340 104 L550 104" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="130" y1="104" x2="130" y2="138" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="104" x2="340" y2="138" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="550" y1="104" x2="550" y2="138" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- elapsed-time tick labels -->
<text x="138" y="122" font-family="sans-serif" font-size="12" fill="#5F5E5A">100ms</text>
<text x="348" y="122" font-family="sans-serif" font-size="12" fill="#5F5E5A">1s</text>
<text x="558" y="122" font-family="sans-serif" font-size="12" fill="#5F5E5A">5s</text>

<!-- Order placed -->
<g>
<rect x="250" y="40" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Order placed</text>
<text x="340" y="74" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">T=0</text>
</g>

<!-- Check 1: 100ms, lightest fill -->
<g>
<rect x="40" y="140" width="180" height="88" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="130" y="164" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Check 1</text>
<text x="130" y="184" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">Filled?</text>
<text x="130" y="206" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C">24.5% fill rate</text>
</g>

<!-- Check 2: 1s, mid fill -->
<g>
<rect x="250" y="140" width="180" height="88" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="164" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Check 2</text>
<text x="340" y="184" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">Filled?</text>
<text x="340" y="206" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C">72.8% fill rate</text>
</g>

<!-- Check 3: 5s, strongest fill -->
<g>
<rect x="460" y="140" width="180" height="88" rx="8" fill="#1D9E75" stroke="#085041" stroke-width="0.5"/>
<text x="550" y="164" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#E1F5EE">Check 3</text>
<text x="550" y="184" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#E1F5EE">Filled?</text>
<text x="550" y="206" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#ffffff">94.0% fill rate</text>
</g>

<text x="340" y="264" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888780">(aggregate rates from validation day)</text>
</svg>
